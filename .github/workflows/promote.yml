name: Model Promotion

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Canonical local run ID to promote'
        required: true
      target_stage:
        description: 'Target release stage'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  pre-promotion-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      approved: ${{ steps.checks.outputs.approved }}
      model_metrics: ${{ steps.checks.outputs.metrics }}
      resolved_run_id: ${{ steps.resolve.outputs.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Resolve canonical bundle-backed run id
        id: resolve
        run: |
          python scripts/resolve_registry_run.py \
            --run-id "${{ github.event.inputs.run_id }}" \
            --output /tmp/resolved_promotion_run.json

          RUN_ID=$(python -c "import json; print(json.load(open('/tmp/resolved_promotion_run.json', encoding='utf-8'))['resolved_run_id'])")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Restore bundle from durable storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_RELEASE_TAG_PREFIX: bundle-archive
        run: |
          python scripts/restore_training_bundle.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --artifact-name training-artifacts \
            --output /tmp/restored_bundle.json

      - name: Validate run for promotion
        id: checks
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python scripts/validate_promotion.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --target-stage "${{ github.event.inputs.target_stage }}" \
            --output /tmp/promotion_check.json

          python -c "
          import json
          with open('/tmp/promotion_check.json', encoding='utf-8') as f:
              result = json.load(f)
          print(f\"approved={'true' if result.get('passed') else 'false'}\")
          print(f\"metrics={json.dumps(result.get('metrics', {}))}\")
          " >> $GITHUB_OUTPUT

      - name: Upload promotion validation
        uses: actions/upload-artifact@v4
        with:
          name: promotion-validation-${{ steps.resolve.outputs.run_id }}
          path: |
            /tmp/promotion_check.json
            /tmp/resolved_promotion_run.json
            /tmp/restored_bundle.json
          retention-days: 30

  approval:
    needs: pre-promotion-checks
    if: github.event.inputs.target_stage == 'production' && needs.pre-promotion-checks.outputs.approved == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Approval required
        run: echo "Production release approval granted via environment protection"

  promote:
    needs: [pre-promotion-checks, approval]
    if: always() && needs.pre-promotion-checks.outputs.approved == 'true' && (github.event.inputs.target_stage != 'production' || needs.approval.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Promote run in registry
        run: |
          ACTIVATE_PRODUCTION="true"
          if [ "${{ github.event.inputs.target_stage }}" = "production" ]; then
            ACTIVATE_PRODUCTION="false"
          fi

          python scripts/promote_model.py \
            --run-id "${{ needs.pre-promotion-checks.outputs.resolved_run_id }}" \
            --target-stage "${{ github.event.inputs.target_stage }}" \
            --promoted-by "${{ github.actor }}" \
            --promotion-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --activate-production "$ACTIVATE_PRODUCTION"

      - name: Persist promotion state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git add experiments/registry
          if git diff --cached --quiet; then
            echo "No promotion state changes to commit"
          else
            git commit -m "ci: promote model ${{ needs.pre-promotion-checks.outputs.resolved_run_id }} to ${{ github.event.inputs.target_stage }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Tag approved release
        if: github.event.inputs.target_stage == 'production'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="release-approval/${{ needs.pre-promotion-checks.outputs.resolved_run_id }}-$(date +%Y%m%d_%H%M%S)"
          git tag -a "$TAG" -m "Approved for production deployment: ${{ needs.pre-promotion-checks.outputs.resolved_run_id }}" HEAD 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

      - name: Upload promotion summary
        uses: actions/upload-artifact@v4
        with:
          name: promotion-summary-${{ needs.pre-promotion-checks.outputs.resolved_run_id }}
          path: experiments/registry
          retention-days: 14
