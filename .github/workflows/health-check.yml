name: Health Check

permissions:
  contents: write
  issues: write
  actions: read

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  workflow_call:
    secrets:
      MLFLOW_TRACKING_URI:
        required: false
      MLFLOW_TRACKING_USERNAME:
        required: false
      MLFLOW_TRACKING_PASSWORD:
        required: false
      PRODUCTION_SERVICE_BASE_URL:
        required: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.check.outputs.status }}
      issues: ${{ steps.check.outputs.issues }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Resolve active production run
        id: active
        continue-on-error: true
        run: |
          python scripts/resolve_active_production_run.py --output /tmp/active_production_run.json
          RUN_ID=$(python -c "import json; print(json.load(open('/tmp/active_production_run.json', encoding='utf-8')).get('run_id', ''))")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Restore active production bundle
        if: steps.active.outputs.run_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUNDLE_RELEASE_TAG_PREFIX: bundle-archive
        run: |
          python scripts/restore_training_bundle.py \
            --run-id "${{ steps.active.outputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --output /tmp/restored_production_bundle.json

      - name: Run system health checks
        id: check
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          SERVICE_BASE_URL: ${{ secrets.PRODUCTION_SERVICE_BASE_URL }}
        run: |
          MLFLOW_FLAG=""
          if [[ -n "$MLFLOW_TRACKING_URI" ]]; then
            MLFLOW_FLAG="--check-mlflow"
          fi

          python scripts/health_check.py \
            $MLFLOW_FLAG \
            --check-production-model \
            --check-registry \
            --check-inference \
            --service-base-url "$SERVICE_BASE_URL" \
            --output /tmp/health_report.json
          
          python -c "
          import json
          with open('/tmp/health_report.json') as f:
              result = json.load(f)
          print(f\"status={result.get('overall_status', 'unknown')}\")
          print(f\"issues={json.dumps(result.get('failed_checks', []))}\")
          " >> $GITHUB_OUTPUT

      - name: Validate production model performance
        env:
          SERVICE_BASE_URL: ${{ secrets.PRODUCTION_SERVICE_BASE_URL }}
        run: |
          python scripts/validate_production_model.py \
            --service-base-url "$SERVICE_BASE_URL"

      - name: Check data/concept drift in production
        run: |
          if [[ -f experiments/registry/baseline_stats.json ]]; then
            python scripts/check_production_drift.py \
              --baseline experiments/registry/baseline_stats.json \
              --output /tmp/drift_report.json
          else
            printf '{"status":"skipped","reason":"baseline_stats_missing"}\n' > /tmp/drift_report.json
          fi

      - name: Verify resource usage
        run: |
          python scripts/check_resource_usage.py \
            --check-disk-space \
            --check-model-cache \
            --warning-threshold 80

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: |
            /tmp/health_report.json
            /tmp/drift_report.json
          retention-days: 90

  escalate-on-unhealthy:
    needs: health-check
    if: needs.health-check.outputs.status != 'healthy'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Production System Health Alert',
              body: `
                ## Health Check Failed
                
                **Status**: ${{ needs.health-check.outputs.status }}
                
                **Issues**:
                ${{ needs.health-check.outputs.issues }}
                
                [View Health Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `,
              labels: ['critical', 'health-check']
            })

      - name: Notify ops team (integration point)
        run: |
          echo "Send alert to: Slack, PagerDuty, Email, etc."
          echo "Status: ${{ needs.health-check.outputs.status }}"
          echo "Issues: ${{ needs.health-check.outputs.issues }}"

  auto-rollback-if-critical:
    needs: health-check
    if: needs.health-check.outputs.status != 'healthy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Trigger automatic rollback
        run: |
          echo "⚠️ CRITICAL health issues detected - initiating auto-rollback"
          python scripts/auto_rollback.py \
            --steps-back 2 \
            --reason "Critical health check failure" \
            --approval-reason "Automatic safety rollback"

      - name: Persist rollback state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${{ github.ref_name }}"
          git add experiments/registry
          if git diff --cached --quiet; then
            echo "No rollback state changes to commit"
          else
            git commit -m "ci: auto rollback after failed health check"
            git push origin HEAD:${{ github.ref_name }}
          fi
