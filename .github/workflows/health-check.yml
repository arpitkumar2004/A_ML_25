name: Health Check

permissions:
  contents: read
  issues: write
  actions: read

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  workflow_call:
    secrets:
      MLFLOW_TRACKING_URI:
        required: false
      MLFLOW_TRACKING_USERNAME:
        required: false
      MLFLOW_TRACKING_PASSWORD:
        required: false
      PRODUCTION_SERVICE_BASE_URL:
        required: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.check.outputs.status }}
      issues: ${{ steps.check.outputs.issues }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup
        with:
          cache: 'true'

      - name: Resolve production service URL
        id: service
        env:
          SERVICE_BASE_URL_SECRET: ${{ secrets.PRODUCTION_SERVICE_BASE_URL }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
        run: |
          SERVICE_BASE_URL="$SERVICE_BASE_URL_SECRET"
          if [ -z "$SERVICE_BASE_URL" ] && [ -n "$HF_SPACE_REPO_ID" ]; then
            SERVICE_BASE_URL="https://$(echo "$HF_SPACE_REPO_ID" | tr '/' '-').hf.space"
          fi
          echo "service_base_url=$SERVICE_BASE_URL" >> $GITHUB_OUTPUT

      - name: Resolve active production run
        id: active
        continue-on-error: true
        run: |
          python scripts/resolve_active_production_run.py --output /tmp/active_production_run.json
          RUN_ID=$(python -c "import json; print(json.load(open('/tmp/active_production_run.json', encoding='utf-8')).get('run_id', ''))")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Restore active production bundle
        if: steps.active.outputs.run_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUNDLE_RELEASE_TAG_PREFIX: bundle-archive
        run: |
          python scripts/restore_training_bundle.py \
            --run-id "${{ steps.active.outputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --output /tmp/restored_production_bundle.json

      - name: Run system health checks
        id: check
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          SERVICE_BASE_URL: ${{ steps.service.outputs.service_base_url }}
        run: |
          MLFLOW_FLAG=""
          if [[ -n "$MLFLOW_TRACKING_URI" ]]; then
            MLFLOW_FLAG="--check-mlflow"
          fi

          python scripts/health_check.py \
            $MLFLOW_FLAG \
            --check-production-model \
            --check-registry \
            --check-inference \
            --service-base-url "$SERVICE_BASE_URL" \
            --output /tmp/health_report.json || true

          python -c "
          import json
          with open('/tmp/health_report.json', encoding='utf-8') as f:
              result = json.load(f)
          print(f\"status={result.get('overall_status', 'unknown')}\")
          print(f\"issues={json.dumps(result.get('failed_checks', []))}\")
          " >> $GITHUB_OUTPUT

      - name: Validate production model performance
        if: steps.service.outputs.service_base_url != ''
        continue-on-error: true
        env:
          SERVICE_BASE_URL: ${{ steps.service.outputs.service_base_url }}
        run: |
          python scripts/validate_production_model.py \
            --service-base-url "$SERVICE_BASE_URL"

      - name: Run live prediction smoke test
        if: steps.service.outputs.service_base_url != '' && steps.active.outputs.run_id != ''
        continue-on-error: true
        run: |
          python scripts/live_service_smoke_test.py \
            --service-base-url "${{ steps.service.outputs.service_base_url }}" \
            --expected-run-id "${{ steps.active.outputs.run_id }}" \
            --output /tmp/live_service_smoke.json

      - name: Upload health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: |
            /tmp/active_production_run.json
            /tmp/health_report.json
            /tmp/live_service_smoke.json
          if-no-files-found: ignore
          retention-days: 30

  escalate-on-unhealthy:
    needs: health-check
    if: needs.health-check.outputs.status != 'healthy'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Production health check failed',
              body: `
                ## Health Check Failed

                **Status**: ${{ needs.health-check.outputs.status }}

                **Issues**:
                ${{ needs.health-check.outputs.issues }}

                [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `,
              labels: ['health-check', 'portfolio-demo']
            })
