name: Publish Hugging Face Space

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Canonical local run ID to package for Hugging Face Space'
        required: true
      space_repo_id:
        description: 'Target Hugging Face Space repo ID'
        required: true
        default: 'arpitkumariitkgp/aml25'
      create_if_missing:
        description: 'Create the Space if it does not already exist'
        required: false
        type: boolean
        default: false

jobs:
  publish-space:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      resolved_run_id: ${{ steps.resolve.outputs.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Resolve canonical bundle-backed run id
        id: resolve
        run: |
          python scripts/resolve_registry_run.py \
            --run-id "${{ github.event.inputs.run_id }}" \
            --output /tmp/resolved_hf_run.json

          RUN_ID=$(python -c "import json; print(json.load(open('/tmp/resolved_hf_run.json', encoding='utf-8'))['resolved_run_id'])")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Restore run bundle from training artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/restore_training_bundle_from_artifact.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --output /tmp/restored_bundle.json

      - name: Create Hugging Face Space package
        run: |
          python scripts/create_hf_space_package.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --output-dir /tmp/hf-space-package \
            --space-repo-id "${{ github.event.inputs.space_repo_id }}" \
            --service-image "hf-space:${{ steps.resolve.outputs.run_id }}"

      - name: Upload generated Space package
        uses: actions/upload-artifact@v4
        with:
          name: hf-space-package-${{ steps.resolve.outputs.run_id }}
          path: /tmp/hf-space-package
          retention-days: 14

      - name: Publish package to Hugging Face Space
        env:
          HF_SPACE_TOKEN: ${{ secrets.HF_SPACE_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.create_if_missing }}" = "true" ]; then
            EXTRA_ARGS="--create-if-missing"
          fi
          python scripts/publish_to_hf_space.py \
            --package-dir /tmp/hf-space-package \
            --space-repo-id "${{ github.event.inputs.space_repo_id }}" \
            --token "$HF_SPACE_TOKEN" \
            --commit-message "Deploy run ${{ steps.resolve.outputs.run_id }} to Hugging Face Space" \
            $EXTRA_ARGS

      - name: Verify Space live service
        run: |
          SPACE_URL="https://$(echo '${{ github.event.inputs.space_repo_id }}' | tr '/' '-').hf.space"
          python scripts/wait_for_live_service.py \
            --service-base-url "$SPACE_URL" \
            --expected-run-id "${{ steps.resolve.outputs.run_id }}" \
            --timeout-seconds 900 \
            --interval-seconds 20 \
            --output /tmp/hf-space-health.json

      - name: Upload Space health result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-space-health-${{ steps.resolve.outputs.run_id }}
          path: /tmp/hf-space-health.json
          if-no-files-found: ignore
          retention-days: 7
