name: Training Pipeline

permissions:
  contents: write

on:
  schedule:
    # Run daily retraining at 22:00 UTC (adjust to your preferred time)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force full retraining (bypass drift check)'
        required: false
        default: 'false'
      model_config:
        description: 'Training config (e.g., configs/training/final_train.yaml)'
        required: false
        default: 'configs/training/final_train.yaml'

jobs:
  drift-check:
    # Fast decision gate: should we retrain?
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      should_train: ${{ steps.drift.outputs.should_train }}
      drift_reason: ${{ steps.drift.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Check data/concept drift
        id: drift
        run: |
          # Force retrain flag overrides drift check
          if [[ "${{ github.event.inputs.force_retrain }}" == "true" ]]; then
            printf '{"drift_detected": true, "reason": "Force retrain requested via workflow_dispatch"}\n' > /tmp/drift_check.json
            echo "should_train=true" >> $GITHUB_OUTPUT
            echo "reason=Force retrain requested via workflow_dispatch" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ ! -f experiments/registry/baseline_stats.json ]]; then
            printf '{"drift_detected": true, "reason": "Bootstrap training required because baseline stats are missing"}\n' > /tmp/drift_check.json
            echo "should_train=true" >> $GITHUB_OUTPUT
            echo "reason=Bootstrap training required because baseline stats are missing" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Otherwise, run drift detection
          python scripts/check_data_drift.py \
            --compare-against experiments/registry/baseline_stats.json \
            --output /tmp/drift_check.json
          
          # Parse drift result
          python -c "
          import json
          with open('/tmp/drift_check.json') as f:
              result = json.load(f)
          print(f\"should_train={'true' if result.get('drift_detected') else 'false'}\")
          print(f\"reason={result.get('reason', 'No significant drift')}\" )
          " >> $GITHUB_OUTPUT

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-check-report
          path: /tmp/drift_check.json
          retention-days: 7

  train:
    needs: drift-check
    # Only train if drift detected or force_retrain=true
    if: needs.drift-check.outputs.should_train == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup
        with:
          cache: 'true'

      - name: Download training data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if command -v dvc &> /dev/null; then
            dvc pull -r origin data/raw/train.csv.dvc data/raw/test.csv.dvc || dvc pull -r origin
          fi

          dvc pull -r origin data/raw/train.csv.dvc data/raw/test.csv.dvc

          test -f data/raw/train.csv || (echo "Missing data/raw/train.csv after DVC pull" && exit 1)
          test -f data/raw/test.csv || (echo "Missing data/raw/test.csv after DVC pull" && exit 1)

      - name: Prepare training dataset
        run: |
          python scripts/prepare_training_data.py --input data/raw/train.csv --output data/interim/train_prepared.csv
          test -f data/interim/train_prepared.csv || (echo "Missing data/interim/train_prepared.csv" && exit 1)

      - name: Run training pipeline
        id: train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_MLFLOW_ENABLED: 'true'
          MLFLOW_ENABLED: 'true'
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          CONFIG="${{ github.event.inputs.model_config || 'configs/training/final_train.yaml' }}"
          echo "Training with config: $CONFIG"
          
          python main.py train --config "$CONFIG"

          python -c "
          import json
          idx = json.load(open('experiments/registry/index.json', encoding='utf-8'))
          train_runs = [r for r in idx.get('runs', []) if r.get('stage') == 'train']
          if not train_runs:
              raise SystemExit('No train runs were recorded in experiments/registry/index.json')
          latest = max(train_runs, key=lambda item: item.get('updated_utc') or item.get('created_utc') or '')
          manifest = json.load(open(latest['manifest_path'], encoding='utf-8'))
          payload = {
              'local_run_id': latest['run_id'],
              'manifest_path': latest['manifest_path'],
              'mlflow_run_id': manifest.get('outputs', {}).get('mlflow', {}).get('mlflow_run_id', '')
          }
          json.dump(payload, open('/tmp/training_outputs.json', 'w', encoding='utf-8'), indent=2)
          print(json.dumps(payload, indent=2))
          "

          RUN_ID=$(python -c "import json; v=json.load(open('/tmp/training_outputs.json', encoding='utf-8')).get('mlflow_run_id'); print('' if v is None else str(v))")
          LOCAL_RUN_ID=$(python -c "import json; print(json.load(open('/tmp/training_outputs.json', encoding='utf-8'))['local_run_id'])")
          MANIFEST_PATH=$(python -c "import json; print(json.load(open('/tmp/training_outputs.json', encoding='utf-8'))['manifest_path'])")

          if [[ -z "$RUN_ID" || "$RUN_ID" == "None" || "$RUN_ID" == "null" ]]; then
            echo "Training completed but no valid MLflow run ID was recorded"
            cat /tmp/training_outputs.json
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "local_run_id=$LOCAL_RUN_ID" >> $GITHUB_OUTPUT
          echo "manifest_path=$MANIFEST_PATH" >> $GITHUB_OUTPUT

      - name: Validate model performance
        id: validate
        run: |
          python scripts/validate_training.py \
            --manifest-path "${{ steps.train.outputs.manifest_path }}" \
            --min-smape-improvement 0.02 \
            --max-train-time 7200 \
            --output /tmp/validation.json && echo "validation_passed=true" >> $GITHUB_OUTPUT || echo "validation_passed=false" >> $GITHUB_OUTPUT

      - name: Register trained model
        if: steps.validate.outputs.validation_passed == 'true'
        run: |
          python scripts/register_model.py \
            --run-id "${{ steps.train.outputs.run_id }}" \
            --stage "staging" \
            --tags "automated_training=true,drift_reason=${{ needs.drift-check.outputs.drift_reason }}"

      - name: Persist registry state
        if: steps.validate.outputs.validation_passed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git status
          git add .
          if ! git diff --quiet; then
            echo "Staging unstaged changes before pull"
            git commit -m "ci: auto-stage before rebase"
          fi
          git pull --rebase --autostash origin "${{ github.ref_name }}" || {
            echo "Git pull --rebase failed. Please check for unresolved conflicts or unstaged changes.";
            git status;
            exit 1;
          }
          git add experiments/registry
          if [[ -f "experiments/models/${{ steps.train.outputs.run_id }}/manifest.json" ]]; then
            git add "experiments/models/${{ steps.train.outputs.run_id }}/manifest.json"
          fi
          if git diff --cached --quiet; then
            echo "No registry changes to commit"
          else
            git commit -m "ci: register training run ${{ steps.train.outputs.run_id }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            experiments/registry/
            experiments/reports/
            /tmp/validation.json
            /tmp/training_outputs.json
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Training pipeline failed!"
          echo "Drift reason: ${{ needs.drift-check.outputs.drift_reason }}"

  post-train-smoke:
    needs: [drift-check, train]
    if: needs.drift-check.outputs.should_train == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup

      - name: Pull smoke-test data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if ! command -v dvc &> /dev/null; then
            echo "DVC is required but not installed in this runner"
            exit 1
          fi

          dvc pull -r origin data/raw/train.csv.dvc data/raw/test.csv.dvc

          test -f data/raw/train.csv || (echo "Missing data/raw/train.csv after DVC pull" && exit 1)
          test -f data/raw/test.csv || (echo "Missing data/raw/test.csv after DVC pull" && exit 1)

      - name: Run inference smoke test
        run: |
          python scripts/smoke_pipeline_check.py

      - name: Report status
        if: always()
        run: echo "Post-training smoke test completed"
