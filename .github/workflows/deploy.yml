name: Deploy Live Service

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Canonical local run ID approved for production deployment'
        required: true
      space_repo_id:
        description: 'Target Hugging Face Space repo ID'
        required: true
        default: 'arpitkumariitkgp/aml25'
      create_if_missing:
        description: 'Create the target Space if it does not already exist'
        required: false
        type: boolean
        default: false

jobs:
  pre-deployment-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      deployment_approved: ${{ steps.checks.outputs.approved }}
      resolved_run_id: ${{ steps.resolve.outputs.run_id }}
      service_base_url: ${{ steps.space.outputs.service_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup
        with:
          cache: 'true'

      - name: Resolve canonical bundle-backed run id
        id: resolve
        run: |
          python scripts/resolve_registry_run.py \
            --run-id "${{ github.event.inputs.run_id }}" \
            --output /tmp/resolved_deploy_run.json

          RUN_ID=$(python -c "import json; print(json.load(open('/tmp/resolved_deploy_run.json', encoding='utf-8'))['resolved_run_id'])")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Derive Space URL
        id: space
        run: |
          SERVICE_BASE_URL="https://$(echo '${{ github.event.inputs.space_repo_id }}' | tr '/' '-').hf.space"
          echo "service_base_url=$SERVICE_BASE_URL" >> $GITHUB_OUTPUT

      - name: Restore bundle from durable storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUNDLE_RELEASE_TAG_PREFIX: bundle-archive
        run: |
          python scripts/restore_training_bundle.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --output /tmp/restored_bundle.json

      - name: Pull deployment test data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if command -v dvc &> /dev/null; then
            dvc pull -r origin data/raw/test.csv.dvc || dvc pull -r origin
          fi

          test -f data/raw/test.csv || (echo "Missing data/raw/test.csv after DVC pull" && exit 1)

      - name: Verify deployment readiness
        id: checks
        run: |
          python scripts/pre_deployment_checks.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --output /tmp/deployment_checks.json \
            --check-tests \
            --check-coverage \
            --check-security

          python -c "
          import json
          with open('/tmp/deployment_checks.json', encoding='utf-8') as f:
              result = json.load(f)
          print(f\"approved={'true' if result.get('all_passed') else 'false'}\")
          " >> $GITHUB_OUTPUT

      - name: Run bundle-backed inference smoke test
        run: |
          python scripts/test_model_inference.py \
            --run-id "${{ steps.resolve.outputs.run_id }}" \
            --test-dataset data/raw/test.csv \
            --output /tmp/pre_deploy_inference.json

      - name: Upload pre-deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pre-deployment-${{ steps.resolve.outputs.run_id }}
          path: |
            /tmp/resolved_deploy_run.json
            /tmp/restored_bundle.json
            /tmp/deployment_checks.json
            /tmp/pre_deploy_inference.json
          retention-days: 14

  deploy-to-hf-space:
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.deployment_approved == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python and dependencies
        uses: ./.github/actions/python-setup
        with:
          cache: 'true'

      - name: Restore bundle from durable storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUNDLE_RELEASE_TAG_PREFIX: bundle-archive
        run: |
          python scripts/restore_training_bundle.py \
            --run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --output /tmp/restored_bundle.json

      - name: Create Hugging Face Space package
        run: |
          python scripts/create_hf_space_package.py \
            --run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}" \
            --output-dir /tmp/hf-space-package \
            --space-repo-id "${{ github.event.inputs.space_repo_id }}" \
            --service-image "hf-space:${{ needs.pre-deployment-checks.outputs.resolved_run_id }}"

      - name: Upload generated Space package
        uses: actions/upload-artifact@v4
        with:
          name: hf-space-package-${{ needs.pre-deployment-checks.outputs.resolved_run_id }}
          path: /tmp/hf-space-package
          retention-days: 14

      - name: Publish package to Hugging Face Space
        env:
          HF_SPACE_TOKEN: ${{ secrets.HF_SPACE_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.create_if_missing }}" = "true" ]; then
            EXTRA_ARGS="--create-if-missing"
          fi

          python scripts/publish_to_hf_space.py \
            --package-dir /tmp/hf-space-package \
            --space-repo-id "${{ github.event.inputs.space_repo_id }}" \
            --token "$HF_SPACE_TOKEN" \
            --commit-message "Deploy run ${{ needs.pre-deployment-checks.outputs.resolved_run_id }} to Hugging Face Space" \
            $EXTRA_ARGS

      - name: Wait for live service readiness
        run: |
          python scripts/wait_for_live_service.py \
            --service-base-url "${{ needs.pre-deployment-checks.outputs.service_base_url }}" \
            --expected-run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}" \
            --timeout-seconds 900 \
            --interval-seconds 20 \
            --output /tmp/live_service_probe.json

      - name: Run live prediction smoke test
        run: |
          python scripts/live_service_smoke_test.py \
            --service-base-url "${{ needs.pre-deployment-checks.outputs.service_base_url }}" \
            --expected-run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}" \
            --service-timeout-seconds 20 \
            --prediction-timeout-seconds 180 \
            --retries 3 \
            --retry-delay-seconds 20 \
            --output /tmp/live_service_smoke.json

      - name: Record verified production state
        run: |
          python scripts/update_deployment_manifest.py \
            --run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}" \
            --strategy hf_space \
            --manifest-path experiments/registry/deployment_manifest.json \
            --environment production \
            --deployed-by "${{ github.actor }}" \
            --deployment-url "${{ needs.pre-deployment-checks.outputs.service_base_url }}" \
            --status active \
            --service-image "hf-space:${{ needs.pre-deployment-checks.outputs.resolved_run_id }}"

          python scripts/activate_production_run.py \
            --run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}"

          python scripts/update_production_tracker.py \
            --run-id "${{ needs.pre-deployment-checks.outputs.resolved_run_id }}" \
            --strategy hf_space \
            --manifest-path experiments/registry/production_tracker.json \
            --deployment-manifest-path experiments/registry/deployment_manifest.json \
            --metrics-input /tmp/live_service_probe.json \
            --status active

      - name: Validate production metrics against live service
        run: |
          python scripts/validate_production_model.py \
            --service-base-url "${{ needs.pre-deployment-checks.outputs.service_base_url }}"

      - name: Persist verified deployment state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git add experiments/registry/index.json
          git add experiments/registry/deployment_manifest.json
          git add experiments/registry/production_tracker.json
          if git diff --cached --quiet; then
            echo "No deployment state changes to commit"
          else
            git commit -m "ci: deploy ${{ needs.pre-deployment-checks.outputs.resolved_run_id }} to HF Space"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload live deployment verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-deployment-${{ needs.pre-deployment-checks.outputs.resolved_run_id }}
          path: |
            /tmp/live_service_probe.json
            /tmp/live_service_smoke.json
            experiments/registry/index.json
            experiments/registry/deployment_manifest.json
            experiments/registry/production_tracker.json
          if-no-files-found: ignore
          retention-days: 30
