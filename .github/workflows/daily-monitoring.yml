name: Daily Monitoring

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  daily-monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build monitoring dashboard and alerts
        run: |
          python scripts/run_daily_monitoring.py --config configs/monitoring/alerts.yaml

      - name: Upload monitoring artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-artifacts
          path: |
            experiments/monitoring/dashboard.json
            experiments/monitoring/dashboard.html
            experiments/monitoring/alert_payload.json
            experiments/monitoring/drift_snapshots.jsonl
