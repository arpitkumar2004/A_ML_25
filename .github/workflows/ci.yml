name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax gate
        run: python -m compileall src main.py

      - name: Unit tests gate
        run: pytest -q ci_cd/tests

      - name: Repo hygiene gate
        run: python scripts/check_repo_hygiene.py

      - name: CLI smoke gate
        run: python main.py --help
