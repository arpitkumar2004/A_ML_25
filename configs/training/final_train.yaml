training:
  run_full_training: true
  data_path: "data/interim/train_prepared.csv"
  sample_frac: 0.01
  target_col: "price"
  text_col: "catalog_content"
  image_col: "image_link"
  id_col: "sample_id"

  models:
    - "Linear"
    - "RF"
    - "LGBM"
    - "XGB"
    - "CatBoost"

  feature_cache: "data/processed/features.joblib"
  dim_cache: "data/processed/dimred.joblib"
  use_dim_cache: true
  registry_dir: "experiments/registry"
  selector_cfg:
    enabled: true
    method: "f_regression"
    k: 512
    min_features: 128
    save_path: "data/processed/feature_selector.joblib"
    random_state: 42

  post_log_cfg:
    enabled: true
    alpha: 0.01
    min_skew: 1.0
    min_samples: 30
    max_test_rows: 50000
    save_path: "data/processed/post_feature_log_transform.joblib"
    random_state: 42

  trainer:
    n_splits: 5
    random_state: 42

  stacker:
    run_stacker: true
    method: "ridge"
    n_splits: 5
    params:
      alpha: 1.0

  quality_gates:
    max_smape: 30.0
    max_p95_latency_seconds: 5.0
    max_critical_drift_features: 0

  mlflow:
    enabled: true
    tracking_uri: ""
    experiment_name: "A_ML_25_final_training"
    model_registry:
      enabled: true
      name: "A_ML_25_final_models"
    dagshub:
      enabled: true
      repo_owner: "arpitkumar2004"
      repo_name: "A_ML_25"
      host: "https://dagshub.com"
