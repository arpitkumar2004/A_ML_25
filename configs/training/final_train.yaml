training:
  run_full_training: true
  sample_frac: 1.0
  target_col: "Price"
  text_col: "Description"
  image_col: "image_path"
  id_col: "unique_identifier"

  models:
    - "Linear"
    - "RF"
    - "LGBM"
    - "XGB"
    - "Cat"

  feature_cache: "data/processed/features.joblib"
  dim_cache: "data/processed/dimred.joblib"
  use_dim_cache: true
  registry_dir: "experiments/registry"
  selector_cfg:
    enabled: true
    method: "f_regression"
    k: 2048
    min_features: 128
    save_path: "data/processed/feature_selector.joblib"
    random_state: 42

  trainer:
    n_splits: 5
    random_state: 42

  stacker:
    run_stacker: true
    method: "ridge"
    n_splits: 5
    params:
      alpha: 1.0
