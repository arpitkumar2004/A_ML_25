training:
  run_full_training: true
  data_path: "data/interim/train_prepared.csv"
  sample_frac: 0.005
  target_col: "Price"
  text_col: "Description"
  image_col: "image_path"
  id_col: "unique_identifier"

  models:
    - "Linear"
    - "RF"

  feature_cache: "data/processed/features.joblib"
  dim_cache: "data/processed/dimred.joblib"
  use_dim_cache: true
  registry_dir: "experiments/registry"
  selector_cfg:
    enabled: true
    method: "f_regression"
    k: 2048
    min_features: 128
    save_path: "data/processed/feature_selector.joblib"
    random_state: 42

  trainer:
    n_splits: 5
    random_state: 42

  stacker:
    run_stacker: true
    method: "ridge"
    n_splits: 5
    params:
      alpha: 1.0

  quality_gates:
    max_smape: 25.0
    max_p95_latency_seconds: 5.0
    max_critical_drift_features: 0

  mlflow:
    enabled: true
    tracking_uri: ""
    experiment_name: "A_ML_25-train"
    model_registry:
      enabled: true
      name: "A_ML_25-train-model"
    dagshub:
      enabled: true
      repo_owner: "arpitkumar2004"
      repo_name: "A_ML_25"
      host: "https://dagshub.com"
