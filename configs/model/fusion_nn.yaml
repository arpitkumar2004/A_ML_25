## fusion_nn.yaml
model:
  name: fusion_nn
  params:
    input_dim: 512
    hidden_dim: 256
    output_dim: 1
    num_layers: 2
    dropout: 0.3
    lr: 0.001
    batch_size: 32
    epochs: 10
    early_stopping_rounds: 3
    random_seed: 42
    target_transform: log1p  # options: log1p, none
    device: "cuda"  # or "cpu"
    verbose: 1
    n_splits: 3  # number of CV folds
    stratified: false  # whether to use stratified splitting for regression
    stratify_bins: 10  # number of bins for stratification if stratified is
    load_best_model_at_end: true
    metric_for_best_model: "smape"
    greater_is_better: false
    output_dir: "experiments/models/fusion_nn_model"
    logging_dir: "experiments/logs/fusion_nn_logs"
    save_steps: 100
    eval_steps: 100
    evaluation_strategy: "steps"  # or "epoch"
    save_total_limit: 2
    n_jobs: 4  # number of workers for data loading
    pin_memory: true  # whether to use pin_memory in DataLoader