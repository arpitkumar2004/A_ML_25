inference:
  input_path: "data/test/catalog_test.csv"
  output_path: "experiments/submissions/submission.csv"
  text_col: "Description"
  image_col: "image_path"
  id_col: "unique_identifier"
  pred_col: "predicted_price"
  feature_cache: "data/processed/features.joblib"
  dim_cache: "data/processed/dimred.joblib"
  models_dir: "experiments/models"
  oof_meta_path: "experiments/oof/model_names.joblib"
  stacker_path: "experiments/models/stacker.joblib"
  target_transform: "log1p"  # if model trained on log1p
  round: true
  min_value: 0.0
