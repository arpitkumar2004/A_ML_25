inference:
  input_path: "data/test/catalog_test.csv"
  output_path: "experiments/submissions/submission.csv"
  text_col: "catalog_content"
  image_col: "image_link"
  id_col: "sample_id"
  pred_col: "predicted_price"
  feature_cache: "data/processed/features.joblib"
  dim_cache: "data/processed/dimred.joblib"
  registry_dir: "experiments/registry"
  latency_log_path: "experiments/monitoring/latency_events.jsonl"
  selector_cfg:
    enabled: true
    method: "f_regression"
    k: 2048
    min_features: 128
    save_path: "data/processed/feature_selector.joblib"
    random_state: 42
  post_log_cfg:
    enabled: true
    alpha: 0.01
    min_skew: 1.0
    min_samples: 30
    max_test_rows: 50000
    save_path: "data/processed/post_feature_log_transform.joblib"
    random_state: 42
  models_dir: "experiments/models"
  oof_meta_path: "experiments/oof/model_names.joblib"
  stacker_path: "experiments/models/stacker.joblib"
  target_transform: "log1p"  # if model trained on log1p
  round: true
  min_value: 0.0
  mlflow:
    enabled: true
    tracking_uri: ""
    experiment_name: "A_ML_25-inference"
    dagshub:
      enabled: false
      repo_owner: ""
      repo_name: ""
      host: "https://dagshub.com"
