pipeline:
	name: aml25-quality-gates
	triggers:
		- push
		- pull_request

	stages:
		- name: setup
			steps:
				- python -m pip install --upgrade pip
				- pip install -r requirements.txt
				- pip install pytest

		- name: syntax
			steps:
				- python -m compileall src main.py

		- name: config_validation
			steps:
				- python scripts/validate_configs.py

		- name: unit_tests
			steps:
				- pytest -q ci_cd/tests

		- name: smoke
			steps:
				- python main.py --help
				- python scripts/smoke_train_predict.py

		- name: monitoring_gate
			steps:
				- python scripts/build_monitoring_dashboard.py --config configs/monitoring/alerts.yaml
				- python scripts/check_monitoring_alerts.py --dashboard experiments/monitoring/dashboard.json

